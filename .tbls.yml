# tbls 配置 — 数据库文档自动生成
# 用法: tbls doc --force
# 文档: https://github.com/k1LoW/tbls

name: Logos
desc: Logos AI 新闻分析助手数据库 — 文章存储 + 父子分块 RAG + pgvector 向量检索

# 使用环境变量，与 .env 中的 PG_DSN 保持一致
dsn: ${PG_DSN}?sslmode=disable

# 输出到 docs/generated/dbdoc/ 目录
docPath: docs/generated/dbdoc

# 排除 pgvector 扩展的内部函数 (不属于应用 Schema)
exclude:
  - public.vector_*
  - public.halfvec_*
  - public.sparsevec_*
  - public.ivfflat*
  - public.hnsw*
  - public.l2_*
  - public.l1_*
  - public.inner_product
  - public.cosine_distance
  - public.hamming_distance
  - public.jaccard_distance
  - public.binary_quantize
  - public.subvector
  - public.array_to_*
  - public.avg
  - public.sum

# ER 图: mermaid 格式 (无需 Graphviz，GitHub 原生渲染)
er:
  format: mermaid
  comment: true

# 文档格式
format:
  adjust: true
  sort: false
  hideColumnsWithoutValues:
    - Children
    - Parents

# Lint 规则
lint:
  requireTableComment:
    enabled: true
  requireColumnComment:
    enabled: true
    exclude:
      - id
      - created_at
  columnCount:
    enabled: true
    max: 15

# 中文字典
dict:
  Tables: 表一览
  Description: 说明
  Columns: 列一览
  Indexes: 索引一览
  Constraints: 约束一览
  Triggers: 触发器
  Relations: ER 图
  Name: 名称
  Comment: 备注
  Type: 类型
  Default: 默认值
  Children: 子表
  Parents: 父表
  Definition: 定义
  Table Definition: 表定义
