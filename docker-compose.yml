# Logos 基础设施容器编排
# 用法: docker compose up -d
# 只容器化基础设施服务，应用代码在本地 .venv 中运行

services:
  # PostgreSQL — authoritative metadata, parent chunks, FTS, tasks
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: logos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis — Celery Broker + Result Backend
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: logos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Qdrant — child chunk vectors and payload metadata
  qdrant:
    image: qdrant/qdrant:latest
    platform: linux/amd64
    container_name: logos-qdrant
    ports:
      - "16333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
